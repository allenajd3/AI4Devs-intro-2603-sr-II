<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reverse String</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 40px;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 20px;
        }
        input[type="text"] {
            width: 100%;
            max-width: 600px;
            padding: 12px;
            font-size: 1rem;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }
        .btn-reverse {
            display: block;
            margin-top: 12px;
            padding: 10px 20px;
            font-size: 1rem;
            background-color: #1a73e8;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .btn-reverse:hover {
            background-color: #1558b0;
        }
        #result {
            margin-top: 20px;
            font-size: 1rem;
        }
        .btn-copy {
            display: block;
            margin-top: 10px;
            padding: 10px 20px;
            font-size: 1rem;
            background-color: #666;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .btn-copy:hover {
            background-color: #444;
        }
    </style>
</head>
<body>
    <h1>Reverse String</h1>
    <input type="text" id="inputText" placeholder="Enter text here..." />
    <button class="btn-reverse" onclick="reverseString()">Reverse 🔄</button>
    <div id="result"></div>
    <button class="btn-copy" id="copyBtn" style="display:none" onclick="copyResult()">Copy 📋</button>
    <script src="script.js"></script>
</body>
</html>
